<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Slot Machine | Cyber Games</title>
  <style>
    :root {
      --bg: #02000a;
      --panel: #0b1024;
      --gold: #ffaa00;
      --gold-soft: #ffcc66;
      --cyan: #00ffff;
      --pink: #ff44aa;
      --magenta: #ff00cc;
      --text: #e0e0e0;
      --muted: #8f93aa;
      --weak: #ff4466;
      --medium: #ffcc66;
      --strong: #00ffff;
      --legendary: #ff44aa;
      --mono: "Courier New", Courier, monospace;
      --body: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100dvh;
      margin: 0;
      padding: clamp(18px, 4vw, 36px) 16px 60px;
      color: var(--text);
      font-family: var(--body);
      background: radial-gradient(ellipse at top, #0a0820 0%, #02000a 80%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.2;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.85) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(0, 255, 255, 0.7) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 68, 170, 0.75) 0 1px, transparent 1.5px);
      background-size: 72px 72px, 118px 118px, 164px 164px;
      background-position: 0 0, 32px 48px, 98px 22px;
    }

    a {
      color: inherit;
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(100%, 720px);
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: clamp(28px, 6vw, 44px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 9px 14px;
      border: 1px solid var(--gold);
      border-radius: 999px;
      color: var(--gold-soft);
      background: rgba(255, 170, 0, 0.08);
      box-shadow: 0 0 18px rgba(255, 170, 0, 0.16);
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
    }

    .info-pill {
      border-color: rgba(0, 255, 255, 0.8);
      color: var(--cyan);
      background: rgba(0, 255, 255, 0.08);
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.14);
      pointer-events: none;
    }

    .back-link:focus-visible,
    button:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 4px;
    }

    header {
      margin-bottom: clamp(22px, 5vw, 34px);
      text-align: center;
    }

    h1 {
      margin: 0;
      color: transparent;
      background: linear-gradient(90deg, var(--gold), var(--pink), var(--cyan), var(--gold));
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      font-size: clamp(2.1rem, 8vw, 4.9rem);
      font-weight: 200;
      letter-spacing: 0.14em;
      line-height: 0.95;
      text-transform: uppercase;
      animation: rainbowText 5s linear infinite;
    }

    .subtitle {
      margin: 14px 0 0;
      color: var(--pink);
      font-family: var(--mono);
      font-size: clamp(0.82rem, 2.5vw, 1.08rem);
      font-style: italic;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255, 68, 170, 0.5);
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      overflow: hidden;
      margin-bottom: 18px;
      border: 1px solid rgba(0, 255, 255, 0.18);
      border-radius: 18px;
      background: rgba(0, 255, 255, 0.18);
      box-shadow: 0 0 26px rgba(0, 255, 255, 0.08);
    }

    .stat-cell {
      min-width: 0;
      padding: 14px 10px 13px;
      background: rgba(6, 9, 26, 0.9);
      text-align: center;
    }

    .stat-label {
      display: block;
      margin-bottom: 8px;
      color: var(--gold-soft);
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .stat-value {
      display: block;
      overflow: hidden;
      color: var(--cyan);
      font-family: var(--mono);
      font-size: clamp(0.92rem, 3.4vw, 1.28rem);
      font-weight: 700;
      text-overflow: ellipsis;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
      white-space: nowrap;
    }

    .slot-machine {
      position: relative;
      padding: clamp(20px, 5vw, 34px);
      border: 3px solid var(--gold);
      border-radius: 28px;
      background: linear-gradient(180deg, #2a1a3a 0%, #1a0a2a 100%);
      box-shadow:
        0 0 34px rgba(255, 170, 0, 0.45),
        0 0 70px rgba(255, 0, 204, 0.18),
        inset 0 2px 0 rgba(255, 255, 255, 0.18),
        inset 0 -18px 42px rgba(0, 0, 0, 0.42);
    }

    .slot-machine::before,
    .slot-machine::after {
      content: "";
      position: absolute;
      top: 16px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8d0 0%, var(--gold-soft) 32%, var(--gold) 62%, #6a3300 100%);
      box-shadow: 0 0 18px rgba(255, 170, 0, 0.9), 0 0 34px rgba(255, 68, 170, 0.45);
      animation: bulbBlink 1s ease-in-out infinite alternate;
    }

    .slot-machine::before {
      left: 18px;
    }

    .slot-machine::after {
      right: 18px;
      animation-delay: 0.5s;
    }

    .machine-title {
      margin: 0 36px 18px;
      color: var(--gold-soft);
      font-family: var(--mono);
      font-size: clamp(0.84rem, 2.8vw, 1.08rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-align: center;
      text-shadow: 0 0 14px rgba(255, 170, 0, 0.55);
    }

    .reels {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(9px, 2.4vw, 16px);
      padding: clamp(12px, 3vw, 18px);
      border: 2px solid rgba(255, 204, 102, 0.65);
      border-radius: 18px;
      background: #05030a;
      box-shadow: inset 0 0 22px rgba(0, 0, 0, 0.85);
    }

    .reel {
      height: 70px;
      overflow: hidden;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #dddddd 100%);
      box-shadow:
        inset 0 9px 14px rgba(255, 255, 255, 0.8),
        inset 0 -12px 18px rgba(0, 0, 0, 0.25),
        0 0 18px rgba(0, 255, 255, 0.12);
    }

    .reel-strip {
      transition: transform 0.25s ease-out;
    }

    .reel.spinning .reel-strip {
      transition: none;
      animation: reelSpin 0.1s linear infinite;
    }

    .reel-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 70px;
      padding: 0 8px;
      color: #151019;
      font-family: var(--mono);
      font-size: clamp(0.7rem, 2.8vw, 1.08rem);
      font-weight: 900;
      line-height: 1.05;
      text-align: center;
      word-break: break-word;
    }

    .password-display {
      margin-top: 18px;
      padding: clamp(14px, 3vw, 18px);
      border: 2px dashed rgba(255, 204, 102, 0.7);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.34);
      text-align: center;
      box-shadow: inset 0 0 20px rgba(255, 170, 0, 0.08);
    }

    #passwordText {
      display: block;
      overflow-wrap: anywhere;
      color: #ffffff;
      font-family: var(--mono);
      font-size: clamp(1.2rem, 5vw, 2.15rem);
      font-weight: 900;
      line-height: 1.16;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.55), 0 0 22px rgba(0, 255, 255, 0.34);
    }

    #passwordText.empty {
      color: var(--muted);
      font-style: italic;
      font-weight: 500;
      text-shadow: none;
    }

    .crack-display {
      margin-top: 18px;
      text-align: center;
    }

    .crack-label {
      display: block;
      margin-bottom: 8px;
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 0.76rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    #crackTime {
      display: block;
      min-height: 1.1em;
      color: var(--text);
      font-family: var(--mono);
      font-size: clamp(1.45rem, 6vw, 2.7rem);
      font-weight: 900;
      line-height: 1.1;
      overflow-wrap: anywhere;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.18);
    }

    #crackTime.weak {
      color: var(--weak);
      text-shadow: 0 0 18px rgba(255, 68, 102, 0.56);
    }

    #crackTime.medium {
      color: var(--medium);
      text-shadow: 0 0 18px rgba(255, 204, 102, 0.56);
    }

    #crackTime.strong {
      color: var(--strong);
      text-shadow: 0 0 18px rgba(0, 255, 255, 0.56);
    }

    #crackTime.legendary {
      color: var(--legendary);
      text-shadow: 0 0 20px rgba(255, 68, 170, 0.72);
    }

    .strength-track {
      height: 9px;
      margin-top: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.55);
    }

    #strengthBar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--weak);
      transition: width 0.55s ease, background 0.25s ease;
    }

    #strengthBar.weak {
      background: var(--weak);
    }

    #strengthBar.medium {
      background: var(--medium);
    }

    #strengthBar.strong {
      background: var(--strong);
    }

    #strengthBar.legendary {
      background: linear-gradient(90deg, var(--gold), var(--pink), var(--cyan), var(--gold));
      background-size: 240% 100%;
      animation: rainbowBar 1.6s linear infinite;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin: 24px 0 0;
    }

    #spinBtn {
      min-width: min(100%, 260px);
      min-height: 58px;
      border: 0;
      border-radius: 999px;
      color: #1a0b00;
      background: linear-gradient(180deg, #ffdd75 0%, var(--gold) 52%, #d57900 100%);
      box-shadow: 0 8px 0 #7a3900, 0 0 26px rgba(255, 170, 0, 0.48);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    #spinBtn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 11px 0 #7a3900, 0 0 38px rgba(255, 170, 0, 0.72);
      filter: saturate(1.12);
    }

    #spinBtn:active:not(:disabled) {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #7a3900, 0 0 18px rgba(255, 170, 0, 0.48);
    }

    #spinBtn:disabled {
      cursor: wait;
      filter: grayscale(0.35) brightness(0.75);
      transform: translateY(3px);
      box-shadow: 0 4px 0 #4a2a07, 0 0 16px rgba(255, 170, 0, 0.22);
    }

    .lesson {
      max-height: 0;
      margin-top: 0;
      padding: 0 clamp(16px, 4vw, 24px);
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: 20px;
      opacity: 0;
      transform: translateY(14px);
      transition: max-height 0.35s ease, margin 0.35s ease, padding 0.35s ease, opacity 0.35s ease, transform 0.35s ease, border-color 0.35s ease;
    }

    .lesson.visible {
      max-height: 260px;
      margin-top: 24px;
      padding: clamp(16px, 4vw, 24px);
      border-color: rgba(0, 255, 255, 0.5);
      opacity: 1;
      transform: translateY(0);
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.16), rgba(255, 0, 204, 0.11));
      box-shadow: 0 0 32px rgba(0, 255, 255, 0.16);
      backdrop-filter: blur(12px);
      animation: lessonIn 0.35s ease both;
    }

    .lesson-tag {
      display: block;
      margin-bottom: 9px;
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    #lessonTitle {
      margin: 0 0 8px;
      color: #ffffff;
      font-size: clamp(1.1rem, 3.8vw, 1.45rem);
      line-height: 1.2;
    }

    #lessonBody {
      margin: 0;
      color: var(--text);
      font-size: 0.98rem;
      line-height: 1.55;
    }

    #lessonBody strong {
      color: var(--gold-soft);
    }

    @keyframes rainbowText {
      from { background-position: 0% 50%; }
      to { background-position: 300% 50%; }
    }

    @keyframes rainbowBar {
      from { background-position: 0% 50%; }
      to { background-position: 240% 50%; }
    }

    @keyframes bulbBlink {
      from {
        opacity: 0.48;
        transform: scale(0.86);
        box-shadow: 0 0 8px rgba(255, 170, 0, 0.45), 0 0 20px rgba(255, 68, 170, 0.18);
      }
      to {
        opacity: 1;
        transform: scale(1);
        box-shadow: 0 0 22px rgba(255, 170, 0, 1), 0 0 42px rgba(255, 68, 170, 0.55);
      }
    }

    @keyframes reelSpin {
      from { transform: translateY(0); }
      to { transform: translateY(-70px); }
    }

    @keyframes lessonIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

    @media (max-width: 480px) {
      body {
        padding-inline: 12px;
      }

      .top-bar {
        align-items: stretch;
        flex-direction: column;
      }

      .back-link {
        width: 100%;
      }

      .stats-bar {
        border-radius: 14px;
      }

      .stat-cell {
        padding-inline: 6px;
      }

      .stat-label {
        font-size: 0.58rem;
      }

      .reels {
        gap: 7px;
        padding: 10px;
      }

      .reel-cell {
        font-size: 0.58rem;
      }

      #passwordText {
        font-size: 1.02rem;
      }

      #crackTime {
        font-size: 1.28rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <nav class="top-bar" aria-label="Cyber Games navigation">
      <a class="back-link" href="games.html">← Cyber Games</a>
      <span class="back-link info-pill">3 reels · entropy lesson</span>
    </nav>

    <header>
      <h1>Password Slot Machine</h1>
      <p class="subtitle">Vegas, but for entropy</p>
    </header>

    <section class="stats-bar" aria-label="Game stats">
      <div class="stat-cell">
        <span class="stat-label">Spins</span>
        <span class="stat-value" id="spinCount">0</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="bestTime">--</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">Worst</span>
        <span class="stat-value" id="worstTime">--</span>
      </div>
    </section>

    <section class="slot-machine" aria-label="Password entropy slot machine">
      <p class="machine-title">PASSWORD ENTROPY-O-MATIC</p>

      <div class="reels" aria-label="Password reels">
        <div class="reel" aria-label="First password fragment">
          <div class="reel-strip">
            <div class="reel-cell">?</div>
          </div>
        </div>
        <div class="reel" aria-label="Second password fragment">
          <div class="reel-strip">
            <div class="reel-cell">?</div>
          </div>
        </div>
        <div class="reel" aria-label="Third password fragment">
          <div class="reel-strip">
            <div class="reel-cell">?</div>
          </div>
        </div>
      </div>

      <div class="password-display" aria-live="polite">
        <span id="passwordText" class="empty">Pull the lever...</span>
      </div>

      <div class="crack-display" aria-live="polite">
        <span class="crack-label">Time to crack</span>
        <span id="crackTime">--</span>
        <div class="strength-track" aria-hidden="true">
          <div id="strengthBar"></div>
        </div>
      </div>
    </section>

    <div class="controls">
      <button id="spinBtn" type="button">Spin</button>
    </div>

    <section class="lesson" id="lesson" role="status" aria-live="polite">
      <span class="lesson-tag">What this teaches</span>
      <h2 id="lessonTitle"></h2>
      <p id="lessonBody"></p>
    </section>
  </main>

  <script>
    const reelsData = [
      [
        { value: "12345", kind: "numeric_short" },
        { value: "password", kind: "common_word" },
        { value: "qwerty", kind: "common_word" },
        { value: "admin", kind: "common_word" },
        { value: "letmein", kind: "common_word" },
        { value: "Summer", kind: "predictable_word" },
        { value: "Spring", kind: "predictable_word" },
        { value: "correct", kind: "passphrase_word" },
        { value: "horse", kind: "passphrase_word" },
        { value: "P@ssw0rd", kind: "l33t_common" }
      ],
      [
        { value: "2024", kind: "numeric_year" },
        { value: "iloveyou", kind: "common_word" },
        { value: "1990", kind: "numeric_year" },
        { value: "!", kind: "symbol" },
        { value: "_", kind: "symbol" },
        { value: "battery", kind: "passphrase_word" },
        { value: "staple", kind: "passphrase_word" },
        { value: "Tx9q", kind: "random" },
        { value: "m$Rk2L", kind: "random" },
        { value: "$", kind: "symbol" }
      ],
      [
        { value: "!", kind: "symbol" },
        { value: "2024!", kind: "numeric_year_symbol" },
        { value: "#1", kind: "symbol" },
        { value: "7gNw#L9pQz", kind: "random_long" },
        { value: "Q@nL$mPv", kind: "random" },
        { value: "\"correct horse\"", kind: "common_word" },
        { value: "sunset-mountain-pebble", kind: "passphrase" },
        { value: "X7@p!2Mq#9wL", kind: "random_long" },
        { value: "1", kind: "numeric_short" },
        { value: "0", kind: "numeric_short" }
      ]
    ];

    const dictionaryPatterns = [
      "password",
      "qwerty",
      "12345",
      "admin",
      "letmein",
      "iloveyou",
      "monkey",
      "dragon",
      "p@ssw0rd",
      "summer2024"
    ];

    const spinBtn = document.getElementById("spinBtn");
    const reelEls = Array.from(document.querySelectorAll(".reel"));
    const passwordText = document.getElementById("passwordText");
    const crackTime = document.getElementById("crackTime");
    const strengthBar = document.getElementById("strengthBar");
    const spinCount = document.getElementById("spinCount");
    const bestTime = document.getElementById("bestTime");
    const worstTime = document.getElementById("worstTime");
    const lesson = document.getElementById("lesson");
    const lessonTitle = document.getElementById("lessonTitle");
    const lessonBody = document.getElementById("lessonBody");

    let spins = 0;
    let bestSeconds = null;
    let worstSeconds = null;
    let isSpinning = false;
    let tickTimers = [];

    function sound(name) {
      if (window.CyberSounds && typeof window.CyberSounds[name] === "function") {
        window.CyberSounds[name]();
      }
    }

    function setReelValue(reel, value) {
      const strip = reel.querySelector(".reel-strip");
      strip.innerHTML = `<div class="reel-cell">${escapeHtml(value)}</div>`;
    }

    function setReelSpinning(reel, reelIndex) {
      const strip = reel.querySelector(".reel-strip");
      const items = reelsData[reelIndex]
        .concat(reelsData[reelIndex])
        .map((item) => `<div class="reel-cell">${escapeHtml(item.value)}</div>`)
        .join("");
      strip.innerHTML = items;
      reel.classList.add("spinning");
      tickTimers[reelIndex] = window.setInterval(() => sound("tick"), 140);
    }

    function stopReel(reel, reelIndex, pick) {
      window.clearInterval(tickTimers[reelIndex]);
      reel.classList.remove("spinning");
      setReelValue(reel, pick.value);
      sound("pop");
    }

    function randomPick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function isPassphrasePick(pick) {
      return pick.kind === "passphrase_word" || pick.kind === "passphrase";
    }

    function buildPassword(picks) {
      const separator = picks.every(isPassphrasePick) ? "-" : "";
      return picks.map((pick) => pick.value).join(separator);
    }

    function calcEntropy(pw) {
      let charset = 0;
      if (/[a-z]/.test(pw)) charset += 26;
      if (/[A-Z]/.test(pw)) charset += 26;
      if (/\d/.test(pw)) charset += 10;
      if (/[^a-zA-Z0-9]/.test(pw)) charset += 32;
      return pw.length * Math.log2(Math.max(charset, 1));
    }

    function isDictionaryPassword(pw) {
      const normalized = pw.toLowerCase();
      return dictionaryPatterns.some((pattern) => normalized.includes(pattern));
    }

    function isPassphrase(pw) {
      const hyphenWords = pw.split("-").filter((word) => /^[a-z]{3,}$/i.test(word));
      const quotedLowerPhrase = /^"[a-z\s-]{15,}"$/.test(pw);
      return hyphenWords.length >= 3 || quotedLowerPhrase;
    }

    function calcCrackSeconds(pw) {
      const guessesPerSecond = 1e11;
      const entropy = calcEntropy(pw);
      let combos = Math.pow(2, entropy) / 2;

      if (isDictionaryPassword(pw)) {
        combos = Math.min(combos, 1e6);
      }

      if (isPassphrase(pw)) {
        combos = Math.max(combos, Math.pow(2, 70));
      }

      return combos / guessesPerSecond;
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return "instant";
      if (seconds < 0.001) return "instant";
      if (seconds < 1) return `${Math.max(1, Math.round(seconds * 1000))} ms`;
      if (seconds < 60) return `${formatNumber(seconds)} sec`;
      if (seconds < 3600) return `${formatNumber(seconds / 60)} min`;
      if (seconds < 86400) return `${formatNumber(seconds / 3600)} hr`;
      if (seconds < 31557600) return `${formatNumber(seconds / 86400)} days`;

      const years = seconds / 31557600;
      if (years < 1000) return `${formatNumber(years)} yr`;
      if (years < 1e6) return `${formatNumber(years / 1000)} k yr`;
      if (years < 1e9) return `${formatNumber(years / 1e6)} M yr`;
      if (years < 1e12) return `${formatNumber(years / 1e9)} B yr`;
      if (years < 1e15) return `${formatNumber(years / 1e12)} T yr`;
      return `${years.toExponential(2)} yr`;
    }

    function formatNumber(value) {
      if (value >= 100) return Math.round(value).toLocaleString();
      if (value >= 10) return value.toFixed(1).replace(/\.0$/, "");
      return value.toFixed(2).replace(/0$/, "").replace(/\.0$/, "");
    }

    function classifyTime(seconds) {
      const year = 31557600;
      if (seconds < 60) return "weak";
      if (seconds < 30 * 86400) return "medium";
      if (seconds < 1e6 * year) return "strong";
      return "legendary";
    }

    function lessonFor(pw) {
      if (isDictionaryPassword(pw)) {
        return {
          title: "Dictionary attacks love familiar words",
          body: "Attackers try leaked favorites first, so <strong>adding a ! or year does not rescue a common password</strong>. Avoid names, seasons, keyboard walks, and famous phrases."
        };
      }

      if (isPassphrase(pw)) {
        return {
          title: "Long passphrases change the math",
          body: "Several random words are easier to remember and much harder to exhaust. A <strong>4-word passphrase is a gold standard</strong> when you need something memorable."
        };
      }

      if (pw.length < 10) {
        return {
          title: "Short passwords run out of road",
          body: "Even with symbols, short passwords leave fewer guesses to test. <strong>Length dominates</strong>, so push beyond 12 characters whenever you can."
        };
      }

      if (/[a-z]/.test(pw) && /[A-Z]/.test(pw) && /\d/.test(pw) && /[^a-zA-Z0-9]/.test(pw) && pw.length >= 12) {
        return {
          title: "Random and long is the jackpot",
          body: "Mixed character sets plus enough length make brute force miserable. <strong>Password managers solve the memorization problem</strong>, so every account can get a unique one."
        };
      }

      return {
        title: "Decent, but improvable",
        body: "This has some variety, but predictable chunks still matter. Make it <strong>longer, less personal, and unique</strong>, or let a password manager generate it."
      };
    }

    function updateStrength(className, entropy) {
      const width = Math.min(100, Math.max(6, Math.round((entropy / 90) * 100)));
      strengthBar.className = className;
      requestAnimationFrame(() => {
        strengthBar.style.width = `${width}%`;
      });
    }

    function updateStats(seconds) {
      spins += 1;
      bestSeconds = bestSeconds === null ? seconds : Math.max(bestSeconds, seconds);
      worstSeconds = worstSeconds === null ? seconds : Math.min(worstSeconds, seconds);
      spinCount.textContent = String(spins);
      bestTime.textContent = formatTime(bestSeconds);
      worstTime.textContent = formatTime(worstSeconds);
    }

    function showLesson(pw) {
      const result = lessonFor(pw);
      lessonTitle.textContent = result.title;
      lessonBody.innerHTML = result.body;
      lesson.classList.add("visible");
    }

    function resetDisplay() {
      passwordText.textContent = "";
      passwordText.classList.remove("empty");
      crackTime.textContent = "--";
      crackTime.className = "";
      strengthBar.className = "";
      strengthBar.style.width = "0%";
      lesson.classList.remove("visible");
    }

    function spin() {
      if (isSpinning) return;

      isSpinning = true;
      spinBtn.disabled = true;
      sound("click");
      resetDisplay();

      const picks = reelsData.map(randomPick);
      reelEls.forEach(setReelSpinning);

      picks.forEach((pick, index) => {
        window.setTimeout(() => {
          stopReel(reelEls[index], index, pick);

          if (index === picks.length - 1) {
            finalizeSpin(picks);
          }
        }, 1100 + index * 600);
      });
    }

    function finalizeSpin(picks) {
      const pw = buildPassword(picks);
      const entropy = calcEntropy(pw);
      const seconds = calcCrackSeconds(pw);
      const className = classifyTime(seconds);

      passwordText.textContent = pw;
      crackTime.textContent = formatTime(seconds);
      crackTime.className = className;
      updateStrength(className, entropy);
      updateStats(seconds);
      showLesson(pw);

      if (className === "legendary") {
        sound("win");
      } else if (className === "strong") {
        sound("correct");
      } else if (className === "weak") {
        sound("wrong");
      }

      spinBtn.disabled = false;
      isSpinning = false;
      spinBtn.focus({ preventScroll: true });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    spinBtn.addEventListener("click", spin);

    window.addEventListener("keydown", (event) => {
      const tagName = document.activeElement ? document.activeElement.tagName : "";
      const isTyping = tagName === "INPUT" || tagName === "TEXTAREA" || document.activeElement?.isContentEditable;

      if (isTyping || spinBtn.disabled) return;

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        spin();
      }
    });
  </script>
  <script src="sounds.js"></script>
</body>
</html>
